<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Student Registration</h1>
            
            <form class="registration-form" id="registrationForm">
                <div class="form-group">
                    <label for="fullName" class="label">Full Name:</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        class="input-field error" 
                        value=""
                    >
                    <span class="error-message">Must contain 9-50 letters</span>
                </div>

                <div class="form-group">
                    <label for="email" class="label">Email:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="input-field error"
                    >
                    <span class="error-message">Valid email required</span>
                </div>

                <div class="form-group">
                    <label for="age" class="label">Age:</label>
                    <input 
                        type="number" 
                        id="age" 
                        name="age" 
                        class="input-field error" 
                        value=""
                    >
                    <span class="error-message">Age 16-30 only</span>
                </div>

                <button type="submit" class="register-button">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
