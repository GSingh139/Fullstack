<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4.3 - Booking System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f7f7f7;
            font-family: Arial, sans-serif;
            color: #333;
            min-height: 100vh;
        }

        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #222;
        }

        .sidebar p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 2px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
        }

        .input-field {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #333;
            background: #fff;
        }

        .input-field:focus {
            outline: none;
            border-color: #4f7ef8;
        }

        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: #4f7ef8;
            color: white;
        }

        .btn:hover { background: #3a6ae0; }

        .btn-cancel {
            background: transparent;
            border: 1px solid #ccc;
            color: #555;
            font-size: 0.8rem;
            padding: 5px 10px;
        }
        .btn-cancel:hover { background: #f0f0f0; }

        .back-link {
            margin-top: auto;
            font-size: 0.85rem;
            color: #4f7ef8;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .main {
            padding: 28px 32px;
        }

        .main h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #222;
        }

        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }

        .booking-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-top: 3px solid #4f7ef8;
            border-radius: 6px;
            padding: 12px 14px;
            position: relative;
        }

        .booking-card .time {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 4px;
        }

        .booking-card .client-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #222;
        }

        .booking-card .remove-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            font-size: 0.8rem;
            color: #bbb;
            cursor: pointer;
        }
        .booking-card .remove-btn:hover { color: #e04444; }

        .trace-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 14px 16px;
        }

        .trace-box h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #444;
        }

        pre {
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #333;
            min-height: 80px;
            overflow-x: auto;
        }

        .empty-msg {
            color: #bbb;
            font-size: 0.875rem;
            padding: 20px 0;
        }

        @media (max-width: 700px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div>
                <h1>Lab 4.3</h1>
                <p>Booking System Simulator</p>
            </div>

            <div class="form-group">
                <label for="client">Client Name</label>
                <input type="text" id="client" class="input-field" placeholder="e.g. Rahul Sharma">
                <label for="time">Time Slot</label>
                <input type="time" id="time" class="input-field">
                <button class="btn" onclick="book()">Book Slot</button>
            </div>

            <a href="../index.html" class="back-link">← Back to Hub</a>
        </aside>

        <main class="main">
            <h2>Active Bookings</h2>
            <div id="bookings" class="bookings-grid">
                <div class="empty-msg">No bookings yet.</div>
            </div>

            <div class="trace-box">
                <h3>API Response</h3>
                <pre id="apiOut">{}</pre>
            </div>
        </main>
    </div>

    <script>
        let bookings = [];

        function book() {
            const clientVal = document.getElementById('client').value.trim();
            const timeVal = document.getElementById('time').value;
            if (!clientVal || !timeVal) return;

            const entry = { id: Date.now(), client: clientVal, timeSlot: timeVal };
            bookings.push(entry);

            document.getElementById('apiOut').innerText = JSON.stringify({
                status: "success",
                data: entry,
                timestamp: new Date().toISOString()
            }, null, 2);

            document.getElementById('client').value = '';
            render();
        }

        function remove(id) {
            bookings = bookings.filter(b => b.id !== id);
            render();
        }

        function render() {
            const container = document.getElementById('bookings');
            if (bookings.length === 0) {
                container.innerHTML = '<div class="empty-msg">No bookings yet.</div>';
                return;
            }
            container.innerHTML = bookings.map(b => `
                <div class="booking-card">
                    <button class="remove-btn" onclick="remove(${b.id})">✕</button>
                    <div class="time">${b.timeSlot}</div>
                    <div class="client-name">${b.client}</div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
